<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Overlay - SpeedRun Race Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* OBS Overlay specific styles */
        :root {
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            background-color: transparent; /* For OBS */
            color: var(--text-main);
            font-family: var(--font-family);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
        }
        #overlay-container {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        #player-name {
            font-size: 24px;
            color: var(--name-color, #6aad38);
        }
        #timer {
            font-size: 40px;
            font-variant-numeric: tabular-nums;
            font-family: monospace;
            color: var(--timer-color, #ffffff);
        }
        #current-split {
            font-size: 20px;
            color: var(--split-color, #a0a0a0);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="overlay-container">
        <div id="player-name" class="hidden"></div>
        <div id="timer" class="hidden"></div>
        <div id="current-split" class="hidden"></div>
    </div>
    <script defer src="config.js"></script>
    <script defer src="obs.js"></script>
</body>
</html>
