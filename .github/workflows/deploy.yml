name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Группа concurrency привязана к ref'у: при двух push'ах подряд
# (или push в main одновременно с push в master) старые job'ы
# отменяются. Так у нас гарантированно один активный deploy.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js
        run: |
          echo 'window.SUPABASE_URL = "${{ secrets.SUPABASE_URL }}";' > config.js
          echo 'window.SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}";' >> config.js
          echo 'window.HOST_PASSWORD = "${{ secrets.HOST_PASSWORD }}";' >> config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
